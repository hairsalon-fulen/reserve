<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>予約 | HAIRSALON FULEN（フレン）</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --brand-color: #1e3a8a; --accent-color: #3eb4c8; }
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #fcfcfc; color: #333; -webkit-tap-highlight-color: transparent; }
        
        /* 管理者バーの復元 */
        .admin-panel { background: #1a1a1a; color: white; border-bottom: 2px solid #3b82f6; }
        
        /* 緊急停止案内 */
        #emergencyOverlay {
            display: none; position: fixed; inset: 0; background: #fff; z-index: 9999;
            flex-direction: column; align-items: center; justify-content: center; padding: 2rem; text-align: center;
        }
        .em-icon { width: 80px; height: 80px; margin-bottom: 24px; color: #ef4444; }
        .em-btn { background-color: #333; color: #fff; font-weight: 700; padding: 16px 48px; border-radius: 9999px; text-decoration: none; }

        .calendar-outer-wrapper { overflow-x: auto; background: white; border: 1px solid #ddd; border-radius: 12px; }
        .hpb-table { width: max-content; min-width: 100%; border-collapse: separate; border-spacing: 0; }
        .hpb-table th, .hpb-table td { border: 0.5px solid #f0f0f0; text-align: center; height: 60px; min-width: 80px; }
        .status-ok { color: #ff7283; cursor: pointer; font-size: 24px; font-weight: bold; }
        .status-ng { color: #ddd; background-color: #fafafa; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="emergencyOverlay">
        <svg class="em-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 4L3 20H21L12 4Z" fill="currentColor"/>
            <path d="M12 9V14M12 17H12.01" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <h2 class="text-2xl font-bold mb-3">ただいま予約受付を停止しております</h2>
        <p class="text-gray-600 mb-8">恐れ入りますが、お電話にてお問い合わせください。</p>
        <a href="tel:0166562040" class="em-btn">電話をかける</a>
    </div>

    <div class="admin-panel p-2 flex justify-between items-center text-[10px]">
        <div class="flex items-center gap-2">
            <span class="text-blue-400 font-bold uppercase tracking-tighter">● Admin Mode</span>
            <button id="emergencyBtn" class="hidden bg-red-600 text-white px-2 py-1 rounded font-bold" onclick="window.toggleEmergencyStop()">
                稼働中(緊急停止)
            </button>
        </div>
        <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" id="adminToggle" onchange="window.toggleAdminMode(this.checked)" class="sr-only peer">
            <div class="w-10 h-5 bg-gray-700 rounded-full peer peer-checked:bg-blue-600 relative after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-4 after:w-4 after:transition-all peer-checked:after:translate-x-5"></div>
            <span class="text-white font-bold">MODE: <span id="modeLabel">OFF</span></span>
        </label>
    </div>

    <section class="flex flex-col items-center py-12 bg-white">
        <img src="logo.png" alt="FULEN" class="w-32 h-32 rounded-full shadow-lg mb-6 object-contain border-4 border-white">
        <h2 class="text-xl font-bold text-gray-700 text-center px-4 leading-relaxed">
            365日、鏡を見るのが<br>楽しくなる艶髪へ。
        </h2>
    </section>

    <main class="max-w-4xl mx-auto p-4 pb-24">
        <div class="flex border-b border-gray-100 mb-8 sticky top-0 bg-white z-40 shadow-sm">
            <div id="stepHeader1" class="flex-1 py-3 text-center border-b-2 border-blue-600 text-blue-600 font-bold text-xs">STEP1</div>
            <div id="stepHeader2" class="flex-1 py-3 text-center text-gray-300 font-bold text-xs">STEP2</div>
            <div id="stepHeader3" class="flex-1 py-3 text-center text-gray-300 font-bold text-xs">STEP3</div>
        </div>

        <div id="step1" class="step-content active">
            <div id="menuList" class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6"></div>
        </div>
        
        <div id="adminSection" class="hidden mt-12 border-t pt-12">
            <h2 class="text-sm font-bold border-l-4 border-blue-500 pl-2 text-blue-600 mb-4">顧客カルテ（予約一覧）</h2>
            <div id="adminBookingList" class="space-y-4"></div>
        </div>
    </main>

    <div id="adminAuthModal" class="fixed inset-0 bg-black/70 hidden z-[10000] flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm text-center">
            <h3 class="font-bold mb-4">管理者パスワード</h3>
            <input type="password" id="adminPass" class="w-full p-4 bg-gray-50 border rounded-xl mb-4 text-center tracking-widest" placeholder="PASSWORD">
            <button onclick="window.verifyAdmin()" class="w-full py-4 bg-blue-600 text-white font-bold rounded-xl mb-2">認証する</button>
            <button onclick="document.getElementById('adminToggle').checked = false; document.getElementById('adminAuthModal').style.display='none'" class="w-full py-4 text-gray-500">キャンセル</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";

        // ★ FULEN様専用・開通設定（ここを一度だけ書くことでエラーを防ぎます）
        const firebaseConfig = { 
            apiKey: "AIzaSyAZPUpUdLpbKbOJGJ6NhOiCqkqRS-tKwCQ", 
            authDomain: "hairsalon-fulen.firebaseapp.com", 
            projectId: "hairsalon-fulen", 
            appId: "1:757183537058:web:7aeee2f1fbb4268af29cfb" 
        };
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw-NeET9N2mNYYMRoEhB9OyGW9lVvDCRj9QF0fn_cdKsaqkN7W809k-huZRnOmgfdf3/exec";
        const APP_ID = "hair-buzl-reserve"; // ★ここをBuzl様と同じ構造（プロジェクトの識別子）に合わせます

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let isAdmin = false;
        let isEmergencyStop = false;

        // 監視スタート
        signInAnonymously(auth).then(() => {
            onSnapshot(doc(db, 'artifacts', APP_ID, 'public', 'data', 'settings', 'emergency'), (snap) => {
                isEmergencyStop = snap.exists() ? snap.data().active : false;
                updateUI();
            });
        });

        const updateUI = () => {
            const overlay = document.getElementById('emergencyOverlay');
            if (overlay) overlay.style.display = (isEmergencyStop && !isAdmin) ? 'flex' : 'none';
            const btn = document.getElementById('emergencyBtn');
            if(btn) {
                btn.innerText = isEmergencyStop ? '🛑 停止中 (解除)' : '✅ 稼働中 (停止)';
                btn.style.backgroundColor = isEmergencyStop ? '#059669' : '#dc2626';
                btn.classList.remove('hidden');
            }
        };

        window.toggleAdminMode = (chk) => {
            if(chk) document.getElementById('adminAuthModal').style.display = 'flex';
            else { isAdmin = false; document.getElementById('modeLabel').innerText = 'OFF'; updateUI(); }
        };

        window.verifyAdmin = async () => {
            const pass = document.getElementById('adminPass').value;
            const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'verifyAdmin', password: pass }) });
            const data = await res.json();
            if(data.success) {
                isAdmin = true;
                document.getElementById('modeLabel').innerText = 'ON';
                document.getElementById('adminAuthModal').style.display = 'none';
                document.getElementById('adminSection')?.classList.remove('hidden');
                document.getElementById('emergencyBtn')?.classList.remove('hidden');
                updateUI();
            } else { alert("パスワードが違います"); }
        };

        window.toggleEmergencyStop = async () => {
            try {
                const docRef = doc(db, 'artifacts', APP_ID, 'public', 'data', 'settings', 'emergency');
                await setDoc(docRef, { active: !isEmergencyStop }, { merge: true });
            } catch (e) {
                alert("通信エラー：Firebaseのルールと住所が一致しているか確認してください");
            }
        };
    </script>
</body>
</html>
