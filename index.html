<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>hair salon | 予約システム</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root { --brand-color: #8a7a6b; --hpb-pink: #ff7283; }
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif; background-color: #fcfcfc; color: #333; }
        
        /* ★画像(image_52f722.png)のUIを完全再現したオーバーレイ */
        #emergencyOverlay {
            display: none; /* 初期状態は非表示 */
            position: fixed;
            inset: 0;
            background: #ffffff;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }
        .emergency-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 24px;
        }
        .emergency-title {
            font-size: 24px;
            font-weight: 700;
            color: #333333;
            margin-bottom: 12px;
            letter-spacing: -0.02em;
        }
        .emergency-text {
            font-size: 16px;
            color: #666666;
            margin-bottom: 32px;
        }
        .emergency-call-btn {
            background-color: #333333;
            color: #ffffff;
            font-weight: 700;
            padding: 16px 48px;
            border-radius: 9999px;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        
        /* 既存のBuzl様用スタイルを継承 [cite: 160-186] */
        .calendar-outer-wrapper { overflow-x: auto; background: white; border: 1px solid #ddd; border-radius: 12px; }
        .hpb-table { width: max-content; min-width: 100%; border-collapse: separate; border-spacing: 0; }
        .hpb-table th, .hpb-table td { border: 0.5px solid #f0f0f0; text-align: center; height: 60px; min-width: 80px; }
        .status-ok { color: var(--hpb-pink); cursor: pointer; }
        .status-ng { color: #ddd; background-color: #fafafa; cursor: not-allowed; }
    </style>
</head>
<body>

    <div id="emergencyOverlay">
        <svg class="emergency-icon" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 4L3 20H21L12 4Z" fill="#ff5252"/>
            <path d="M12 9V14M12 17H12.01" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <h2 class="emergency-title">ただいま予約受付を停止しております</h2>
        <p class="emergency-text">恐れ入りますが、お電話にてお問い合わせください。</p>
        <a href="tel:0166378631" class="emergency-call-btn">電話をかける</a>
    </div>

    <div id="adminAuthModal" class="fixed inset-0 bg-black/70 hidden z-[10000] flex items-center justify-center p-4">
        <div class="bg-white p-6 rounded-2xl w-full max-w-sm text-center shadow-2xl">
            <h3 class="font-bold text-gray-800 mb-4">管理者パスワード</h3>
            <input type="password" id="adminPass" class="w-full p-4 bg-gray-50 border rounded-xl mb-4 text-center tracking-widest" placeholder="PASSWORD">
            <button onclick="window.verifyAdmin()" class="w-full py-4 bg-blue-600 text-white font-bold rounded-xl mb-2">認証する</button>
            <button onclick="document.getElementById('adminAuthModal').style.display='none'; document.getElementById('adminToggle').checked=false;" class="w-full py-4 bg-gray-100 text-gray-600 rounded-xl">キャンセル</button>
        </div>
    </div>

    <div class="bg-stone-900 p-2 flex justify-between items-center text-[10px] text-white">
        <div class="flex items-center gap-2">
            <span class="text-blue-400 font-bold">ADMIN MODE</span>
            <button id="emergencyBtn" class="hidden bg-red-600 px-2 py-1 rounded font-bold" onclick="window.toggleEmergencyStop()">
                稼働中(緊急停止)
            </button>
        </div>
        <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" id="adminToggle" onchange="window.toggleAdminMode(this.checked)" class="hidden">
            <div id="toggleBar" class="w-8 h-4 bg-stone-700 rounded-full relative transition-colors">
                <div id="toggleCircle" class="w-3 h-3 bg-white rounded-full absolute top-0.5 left-0.5 transition-transform"></div>
            </div>
            <span>MODE: <span id="modeLabel">OFF</span></span>
        </label>
    </div>

    <main class="max-w-4xl mx-auto p-4">
        <div id="step1" class="step-content active">
            <div id="menuList" class="grid grid-cols-1 md:grid-cols-2 gap-3 mb-6"></div>
        </div>
        
        <div id="adminBookingSection" class="hidden mt-8">
            <h2 class="text-lg font-bold border-l-4 border-blue-500 pl-2 mb-4">顧客カルテ（予約一覧）</h2>
            <div id="adminBookingList" class="space-y-4"></div>
        </div>
    </main>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, onSnapshot, setDoc, updateDoc, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // 設定：FULEN様/Buzl様に応じてAPP_IDを変更 [cite: 226, 227]
        const firebaseConfig = { apiKey: "AIzaSyAZPUpUdLpbKbOJGJ6NhOiCqkqRS-tKwCQ", authDomain: "hair-buzl-reserve.firebaseapp.com", projectId: "hair-buzl-reserve", appId: "1:757183537058:web:7aeee2f1fbb4268af29cfb" };
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw-NeET9N2mNYYMRoEhB9OyGW9lVvDCRj9QF0fn_cdKsaqkN7W809k-huZRnOmgfdf3/exec";
        const APP_ID = "hair-buzl-reserve";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let isAdmin = false;
        let isEmergencyStop = false;

        // 1. 認証とリアルタイム同期 [cite: 238-242]
        signInAnonymously(auth).then(() => {
            // 緊急停止フラグの監視
            onSnapshot(doc(db, 'artifacts', APP_ID, 'public', 'data', 'settings', 'emergency'), (snap) => {
                isEmergencyStop = snap.exists() ? snap.data().active : false;
                updateSystemUI();
            });
        });

        const updateSystemUI = () => {
            // 案内画面の制御
            const overlay = document.getElementById('emergencyOverlay');
            overlay.style.display = (isEmergencyStop && !isAdmin) ? 'flex' : 'none';

            // 管理者ボタンの制御
            const eBtn = document.getElementById('emergencyBtn');
            if(eBtn) {
                eBtn.innerText = isEmergencyStop ? '🛑 停止中 (解除する)' : '✅ 稼働中 (緊急停止)';
                eBtn.className = isEmergencyStop ? 'bg-green-600 px-2 py-1 rounded font-bold' : 'bg-red-600 px-2 py-1 rounded font-bold';
            }
        };

        // 2. 管理者認証 (GAS連携) [cite: 268-273]
        window.toggleAdminMode = (checked) => {
            if(checked) {
                document.getElementById('adminAuthModal').style.display = 'flex';
            } else {
                isAdmin = false;
                document.getElementById('modeLabel').innerText = 'OFF';
                document.getElementById('adminBookingSection').classList.add('hidden');
                document.getElementById('emergencyBtn').classList.add('hidden');
                updateSystemUI();
            }
        };

        window.verifyAdmin = async () => {
            const pass = document.getElementById('adminPass').value;
            try {
                const res = await fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: 'verifyAdmin', password: pass }) });
                const data = await res.json();
                if(data.success) {
                    isAdmin = true;
                    document.getElementById('modeLabel').innerText = 'ON';
                    document.getElementById('adminAuthModal').style.display = 'none';
                    document.getElementById('adminBookingSection').classList.remove('hidden');
                    document.getElementById('emergencyBtn').classList.remove('hidden');
                    updateSystemUI();
                } else {
                    alert("パスワードが正しくありません");
                }
            } catch (e) { alert("認証エラー"); }
        };

        // 3. 緊急停止の切り替え [cite: 243, 244]
        window.toggleEmergencyStop = async () => {
            const newState = !isEmergencyStop;
            await setDoc(doc(db, 'artifacts', APP_ID, 'public', 'data', 'settings', 'emergency'), { active: newState });
        };

        // ※ その他、カレンダー描画(renderCalendar)やメニュー初期化(initMenu)は
        // 既存の Buzl様インデックスコードのロジックをここに統合してください。
    </script>
</body>
</html>
