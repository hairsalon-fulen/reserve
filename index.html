<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>hair salon FULEN | 予約システム</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root { --brand-color: #8a7a6b; --accent-red: #ff7283; }
        body { font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif; }
        /* 緊急停止時のオーバーレイ */
        #emergencyOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.95);
            z-index: 9999;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body class="bg-stone-50 text-stone-800">

    <div id="emergencyOverlay">
        <i class="fas fa-exclamation-triangle text-6xl text-red-500 mb-4"></i>
        <h2 class="text-2xl font-bold mb-2">ただいま予約受付を停止しております</h2>
        <p>恐れ入りますが、お電話にてお問い合わせください。</p>
        <a href="tel:0000000000" class="mt-4 bg-stone-800 text-white px-6 py-2 rounded-full">電話をかける</a>
    </div>

    <header class="bg-white border-b sticky top-0 z-50 px-4 py-3">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center">
                <img src="logo.png" alt="FULEN" class="h-8 w-auto object-contain" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <span class="hidden font-bold text-xl ml-2">FULEN</span>
            </div>
            <button onclick="openAdminModal()" class="text-xs text-stone-400 border border-stone-200 px-2 py-1 rounded">管理者</button>
        </div>
    </header>

    <main class="max-w-4xl mx-auto p-4 pb-20">
        <div id="calendarContainer" class="bg-white rounded-xl shadow-sm p-4 mb-6">
            <div id="currentMonthDisplay" class="text-center font-bold mb-4">読み込み中...</div>
            <div id="calendarGrid" class="grid grid-cols-7 gap-1"></div>
        </div>

        <section id="adminSection" class="hidden mt-8 bg-stone-800 text-white p-6 rounded-2xl shadow-xl">
            <h3 class="text-xl font-bold mb-4 border-b border-stone-600 pb-2">管理者コントロールパネル</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="bg-stone-700 p-4 rounded-lg">
                    <p class="text-sm mb-2">緊急停止スイッチ</p>
                    <button id="emergencyBtn" onclick="toggleEmergency()" class="w-full py-2 rounded font-bold transition">
                        確認中...
                    </button>
                </div>
                <div class="bg-stone-700 p-4 rounded-lg">
                    <p class="text-sm mb-2">管理者ログアウト</p>
                    <button onclick="location.reload()" class="w-full py-2 bg-stone-500 rounded font-bold">ログアウト</button>
                </div>
            </div>
        </section>
    </main>

    <div id="adminAuthModal" class="fixed inset-0 bg-black/50 hidden z-[60] flex items-center justify-center p-4">
        <div class="bg-white rounded-2xl p-6 w-full max-w-sm">
            <h3 class="text-lg font-bold mb-4 text-center">管理者認証</h3>
            <input type="password" id="adminPass" class="w-full border p-3 rounded-lg mb-4" placeholder="パスワードを入力">
            <div class="flex gap-2">
                <button onclick="closeAdminModal()" class="flex-1 py-3 bg-stone-200 rounded-lg">戻る</button>
                <button onclick="submitAdminAuth()" id="authSubmitBtn" class="flex-1 py-3 bg-stone-800 text-white rounded-lg">認証</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, collection, doc, onSnapshot, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        // --- 設定エリア ---
        const firebaseConfig = { 
            apiKey: "AIzaSyAZPUpUdLpbKbOJGJ6NhOiCqkqRS-tKwCQ", 
            authDomain: "hairsalon-fulen.firebaseapp.com",
            projectId: "hairsalon-fulen",
            appId: "1:757183537058:web:7aeee2f1fbb4268af29cfb"
        };
        const GAS_URL = "https://script.google.com/macros/s/AKfycbw-NeET9N2mNYYMRoEhB9OyGW9lVvDCRj9QF0fn_cdKsaqkN7W809k-huZRnOmgfdf3/exec";
        const APP_ID = "hairsalon-fulen";

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let isAdmin = false;
        let emergencyActive = false;

        // 1. 初期化・認証
        signInAnonymously(auth).catch(err => console.error("Auth Error:", err));

        // 2. リアルタイム監視（緊急停止フラグ）
        onSnapshot(doc(db, 'artifacts', APP_ID, 'public', 'data', 'settings', 'emergency'), (snap) => {
            if (snap.exists()) {
                emergencyActive = snap.data().active;
                updateEmergencyUI();
            }
        });

        const updateEmergencyUI = () => {
            const overlay = document.getElementById('emergencyOverlay');
            const eBtn = document.getElementById('emergencyBtn');

            // 一般ユーザーかつ停止中の場合
            if (emergencyActive && !isAdmin) {
                overlay.style.display = 'flex';
            } else {
                overlay.style.display = 'none';
            }

            // 管理者ボタンの状態更新
            if (eBtn) {
                eBtn.innerText = emergencyActive ? '🛑 停止中（解除する）' : '✅ 稼働中（停止する）';
                eBtn.className = emergencyActive 
                    ? 'w-full py-2 bg-green-600 rounded font-bold' 
                    : 'w-full py-2 bg-red-600 rounded font-bold';
            }
        };

        // 3. 管理者認証（GAS連携）
        window.openAdminModal = () => document.getElementById('adminAuthModal').style.display = 'flex';
        window.closeAdminModal = () => document.getElementById('adminAuthModal').style.display = 'none';

        window.submitAdminAuth = async () => {
            const pass = document.getElementById('adminPass').value;
            const btn = document.getElementById('authSubmitBtn');
            btn.innerText = "認証中...";
            btn.disabled = true;

            try {
                const response = await fetch(GAS_URL, {
                    method: "POST",
                    body: JSON.stringify({ type: 'verifyAdmin', password: pass })
                });
                const res = await response.json();

                if (res.success) {
                    isAdmin = true;
                    alert("管理者ログイン成功");
                    closeAdminModal();
                    document.getElementById('adminSection').classList.remove('hidden');
                    updateEmergencyUI();
                } else {
                    alert("パスワードが違います");
                }
            } catch (e) {
                alert("認証エラーが発生しました");
            } finally {
                btn.innerText = "認証";
                btn.disabled = false;
            }
        };

        // 4. 緊急停止の切り替え（Firebase更新）
        window.toggleEmergency = async () => {
            if (!isAdmin) return;
            const newState = !emergencyActive;
            const ref = doc(db, 'artifacts', APP_ID, 'public', 'data', 'settings', 'emergency');
            try {
                await setDoc(ref, { active: newState }, { merge: true });
                alert(newState ? "予約を停止しました" : "予約受付を再開しました");
            } catch (e) {
                alert("更新に失敗しました");
            }
        };

    </script>
</body>
</html>
